name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Coverage is best-effort: vitest v3 + v8 provider has a known worker
      # timeout bug (onTaskUpdate) on CI runners. Tests pass above; coverage
      # collection may timeout without affecting correctness.
      - name: Coverage
        if: matrix.node-version == 22
        continue-on-error: true
        run: pnpm vitest run --coverage --pool forks --no-file-parallelism

      - name: Upload coverage
        if: matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore
